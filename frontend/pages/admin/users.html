<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users | Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/index.css">
    <style>
        .admin-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .admin-nav a {
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-weight: 500;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .admin-nav a.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .admin-nav a:hover:not(.active) {
            background: var(--bg-color);
            color: var(--primary-color);
        }

        .table-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .table th {
            background-color: var(--bg-color);
            font-weight: 600;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container nav-container">
                <a href="../../index.html" class="logo">
                    <i class="fas fa-shopping-bag"></i> ProShop
                </a>
                <div class="nav-links">
                    <button id="themeToggle" class="icon-btn" title="Toggle Dark Mode">
                        <i class="fas fa-moon"></i>
                    </button>
                    <a href="../cart.html" class="nav-link">
                        <i class="fas fa-shopping-cart"></i> Cart
                        <span id="cartCount" class="badge">0</span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <h1>Admin Dashboard</h1>

        <div class="admin-nav">
            <a href="dashboard.html">Products</a>
            <a href="users.html" class="active">Users</a>
            <a href="orders.html">Orders</a>
        </div>

        <div id="message" style="display: none;"></div>
        <div id="loading" class="loader" style="display: none;"></div>

        <div class="table-container" id="contentContainer">
            <h2>Users List</h2>
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>NAME</th>
                        <th>EMAIL</th>
                        <th>ADMIN</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Users injected here -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="../../js/api.js"></script>
    <script src="../../js/main.js"></script>
    <script src="../../js/admin/users.js"></script>
</body>

</html>
