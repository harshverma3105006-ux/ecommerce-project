<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product | Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/index.css">
    <style>
        .edit-container {
            max-width: 600px;
            margin: 0 auto 50px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-color);
            color: var(--text-color);
            outline: none;
        }

        .btn-block {
            width: 100%;
        }

        .btn-back {
            margin-bottom: 20px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container nav-container">
                <a href="../../index.html" class="logo">
                    <i class="fas fa-shopping-bag"></i> ProShop
                </a>
                <div class="nav-links">
                    <button id="themeToggle" class="icon-btn" title="Toggle Dark Mode">
                        <i class="fas fa-moon"></i>
                    </button>
                    <a href="../cart.html" class="nav-link">
                        <i class="fas fa-shopping-cart"></i> Cart
                        <span id="cartCount" class="badge">0</span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <a href="dashboard.html" class="btn btn-back">Go Back</a>

        <div class="edit-container">
            <h2>Edit Product</h2>
            <div id="message" style="display: none;"></div>
            <div id="loading" class="loader" style="display: none;"></div>

            <form id="editProductForm" style="display: none;">
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Price (₹)</label>
                    <input type="number" id="price" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Image URL</label>
                    <input type="text" id="image" class="form-control" required>
                    <input type="file" id="imageFile" class="form-control" style="margin-top: 10px;">
                </div>
                <div class="form-group">
                    <label class="form-label">Brand</label>
                    <input type="text" id="brand" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Count In Stock</label>
                    <input type="number" id="countInStock" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <input type="text" id="category" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="description" class="form-control" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="updateBtn">Update Product</button>
            </form>
        </div>
    </main>

    <script src="../../js/api.js"></script>
    <script src="../../js/main.js"></script>
    <script src="../../js/admin/product-edit.js"></script>
</body>

</html>
