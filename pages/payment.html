<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Selection | ProShop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/index.css">
    <style>
        .checkout-steps {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            gap: 20px;
        }

        .step {
            color: var(--text-muted);
            font-weight: 600;
        }

        .step.active {
            color: var(--primary-color);
        }

        .payment-container {
            max-width: 500px;
            margin: 0 auto 50px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
        }

        .form-check {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
        }

        .form-check:hover {
            border-color: var(--primary-color);
        }

        .form-check input {
            transform: scale(1.2);
            accent-color: var(--primary-color);
        }

        .form-check label {
            cursor: pointer;
            font-weight: 500;
            flex: 1;
        }

        .btn-block {
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container nav-container">
                <a href="../index.html" class="logo">
                    <i class="fas fa-shopping-bag"></i> ProShop
                </a>
                <div class="nav-links">
                    <button id="themeToggle" class="icon-btn" title="Toggle Dark Mode">
                        <i class="fas fa-moon"></i>
                    </button>
                    <a href="cart.html" class="nav-link">
                        <i class="fas fa-shopping-cart"></i> Cart
                        <span id="cartCount" class="badge">0</span>
                    </a>
                    <div class="dropdown" id="userMenuContainer">
                        <a href="login.html" class="nav-link" id="loginLink">
                            <i class="fas fa-user"></i> Sign In
                        </a>
                        <div class="dropdown-content" id="userDropdown" style="display: none;">
                            <a href="profile.html">Profile</a>
                            <a href="#" id="logoutBtn">Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="checkout-steps">
            <span class="step active">Shipping</span>
            <span>></span>
            <span class="step active">Payment</span>
            <span>></span>
            <span class="step">Place Order</span>
        </div>

        <div class="payment-container">
            <h2>Payment Method</h2>
            <p class="text-muted" style="margin-bottom: 20px;">Select your preferred payment method.</p>
            <form id="paymentForm">

                <div class="form-check" onclick="document.getElementById('razorpay').checked = true;">
                    <input type="radio" id="razorpay" name="paymentMethod" value="Razorpay" checked>
                    <label for="razorpay"><i class="fas fa-credit-card"
                            style="color:var(--primary-color); margin-right:10px;"></i> Razorpay (Card, UPI,
                        NetBanking)</label>
                </div>

                <div class="form-check" onclick="document.getElementById('cod').checked = true;">
                    <input type="radio" id="cod" name="paymentMethod" value="Cash On Delivery">
                    <label for="cod"><i class="fas fa-money-bill-wave"
                            style="color:var(--success-color); margin-right:10px;"></i> Cash On Delivery</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Continue</button>
            </form>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/checkout/payment.js"></script>
</body>

</html>
