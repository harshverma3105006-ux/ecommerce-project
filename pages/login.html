<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ProShop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/index.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 60px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-color);
            color: var(--text-color);
            outline: none;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .btn-block {
            width: 100%;
        }

        .auth-links {
            margin-top: 20px;
            text-align: center;
        }

        .auth-links a {
            color: var(--primary-color);
            font-weight: 500;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container nav-container">
                <a href="../index.html" class="logo">
                    <i class="fas fa-shopping-bag"></i> ProShop
                </a>
                <div class="nav-links">
                    <button id="themeToggle" class="icon-btn" title="Toggle Dark Mode">
                        <i class="fas fa-moon"></i>
                    </button>
                    <a href="cart.html" class="nav-link">
                        <i class="fas fa-shopping-cart"></i> Cart
                        <span id="cartCount" class="badge">0</span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="auth-container">
            <h2>Sign In</h2>
            <div id="message" class="alert alert-danger" style="display: none;"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter email" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign In</button>
            </form>
            <div class="auth-links">
                <p>New Customer? <a href="register.html">Register Here</a></p>
            </div>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/auth/login.js"></script>
</body>

</html>
